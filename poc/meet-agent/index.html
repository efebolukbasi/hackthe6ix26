<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>arch-sync — meeting</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Patrick+Hand&family=Caveat:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- ————— pre-join ————— -->
<div id="prejoin">
  <div class="prejoin-card">
    <div class="logo">arch<span>·</span>sync</div>
    <div class="preview-wrap">
      <video id="preview" autoplay playsinline muted></video>
      <div class="preview-tag">You</div>
    </div>
    <p class="prejoin-note"><span class="dot"></span> <strong>Archie</strong>, the AI architect, is already in the call</p>
    <button id="joinbtn">Join now</button>
    <p class="prejoin-hint">use Chrome · allow camera &amp; microphone</p>
  </div>
</div>

<!-- ————— the call ————— -->
<main id="room" class="hidden">
  <div id="stagewrap">

    <section id="boardcard">
      <div class="board-chip">✏️ Archie is presenting</div>
      <button id="exitboard" title="Back to grid">
        <svg viewBox="0 0 24 24"><path d="M4 4h7v7H4zM13 4h7v7h-7zM4 13h7v7H4zM13 13h7v7h-7z"/></svg>
      </button>
      <canvas id="board"></canvas>
    </section>

    <div id="tiles">
      <div class="tile" id="tile-you">
        <video id="cam" autoplay playsinline muted></video>
        <div class="avatar">E</div>
        <div class="nametag">You</div>
      </div>
      <div class="tile agent" id="tile-agent">
        <div class="orb" id="orb"></div>
        <div class="thinking hidden" id="thinking"><span></span><span></span><span></span></div>
        <div class="nametag">Archie · AI Architect</div>
        <div class="agent-status" id="agentstatus">listening</div>
      </div>
    </div>
  </div>

  <div id="captions">
    <span id="cap-speaker"></span>
    <span id="cap-text"></span>
  </div>

  <footer id="bar">
    <div class="bar-left"><span id="clock">--:--</span><span class="sep">|</span>arch-sync</div>
    <div class="bar-center">
      <button class="ctl" id="btn-mic" title="Toggle microphone">
        <svg viewBox="0 0 24 24"><path d="M12 14a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v5a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V21h2v-3.08A7 7 0 0 0 19 11h-2z"/></svg>
      </button>
      <button class="ctl" id="btn-cam" title="Toggle camera">
        <svg viewBox="0 0 24 24"><path d="M17 10.5V7a1 1 0 0 0-1-1H4a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-3.5l4 4v-11l-4 4z"/></svg>
      </button>
      <button class="ctl" id="btn-cc" title="Toggle captions">
        <svg viewBox="0 0 24 24"><path d="M19 4H5a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2zm-8 7H9.5v-.5h-2v3h2V13H11v1a1 1 0 0 1-1 1H7a1 1 0 0 1-1-1v-4a1 1 0 0 1 1-1h3a1 1 0 0 1 1 1v1zm7 0h-1.5v-.5h-2v3h2V13H18v1a1 1 0 0 1-1 1h-3a1 1 0 0 1-1-1v-4a1 1 0 0 1 1-1h3a1 1 0 0 1 1 1v1z"/></svg>
      </button>
      <button class="ctl" id="btn-chat" title="Ask Archie / transcript">
        <svg viewBox="0 0 24 24"><path d="M20 2H4a2 2 0 0 0-2 2v18l4-4h14a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2z"/></svg>
      </button>
      <button class="ctl end" id="btn-end" title="Leave call">
        <svg viewBox="0 0 24 24"><path d="M12 9c-1.6 0-3.15.25-4.6.72v3.1c0 .4-.23.74-.56.9-.98.49-1.87 1.12-2.66 1.85-.18.18-.43.29-.7.29-.28 0-.53-.11-.71-.29L.29 13.08a.996.996 0 0 1 0-1.41C3.34 8.78 7.46 7 12 7s8.66 1.78 11.71 4.67c.18.18.29.43.29.71 0 .28-.11.53-.29.71l-2.48 2.48c-.18.18-.43.29-.71.29-.27 0-.52-.11-.7-.28-.79-.74-1.69-1.36-2.67-1.85-.33-.16-.56-.5-.56-.9v-3.1C15.15 9.25 13.6 9 12 9z"/></svg>
      </button>
    </div>
    <div class="bar-right">👥 2</div>
  </footer>

  <aside id="panel">
    <div class="panel-head">
      <span>Ask Archie</span>
      <button id="panel-close">✕</button>
    </div>
    <div class="chips" id="chips"></div>
    <div class="msgs" id="msgs"></div>
    <form class="panel-input" id="askform">
      <input id="askinput" type="text" placeholder="Type a question…" autocomplete="off">
      <button type="submit">➤</button>
    </form>
  </aside>

  <div id="ended" class="hidden">
    <div class="ended-card">
      <p>You left the call.</p>
      <p class="ended-sub">Archie waved goodbye 👋</p>
      <button onclick="location.reload()">Rejoin</button>
    </div>
  </div>
</main>

<script type="module" src="app.js"></script>
</body>
</html>
